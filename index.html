<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuLu BI: Executive Master Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES --- */
        :root { 
            --lulu-green: #00A642; 
            --bg: #F2F2F7; 
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-blur: blur(24px);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            
            --table-hover: rgba(0, 166, 66, 0.08);
            --success: #34c759; 
            --danger: #ff3b30; 
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-border: rgba(0, 0, 0, 0.1);
            --drill-bg: rgba(255, 255, 255, 0.4);
            --pill-up-bg: rgba(52, 199, 89, 0.15);
            --pill-down-bg: rgba(255, 59, 48, 0.15);
        }

        /* --- DARK MODE --- */
        [data-theme="dark"] {
            --lulu-green: #30d158; 
            --bg: #000000; 
            --text-main: #f5f5f7;
            --text-muted: #98989d;
            
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            
            --table-hover: rgba(48, 209, 88, 0.15);
            --success: #32d74b;
            --danger: #ff453a;
            --input-bg: rgba(44, 44, 46, 0.8);
            --input-border: rgba(255, 255, 255, 0.1);
            --drill-bg: rgba(0, 0, 0, 0.3);
            --pill-up-bg: rgba(50, 215, 75, 0.15);
            --pill-down-bg: rgba(255, 69, 58, 0.15);
        }

        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden; }
        
        /* AUTO-HIDE APPLE SCROLLBARS */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: transparent; border-radius: 10px; transition: background-color 0.3s ease; }
        body:hover::-webkit-scrollbar-thumb,
        .dropdown-menu-custom:hover::-webkit-scrollbar-thumb,
        .sidebar-sticky:hover::-webkit-scrollbar-thumb,
        .chart-scroll-wrapper:hover::-webkit-scrollbar-thumb,
        .table-responsive:hover::-webkit-scrollbar-thumb { background-color: rgba(134, 134, 139, 0.3); }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(134, 134, 139, 0.6) !important; }

        .bento-glass { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); transition: background 0.4s, border-color 0.4s, transform 0.2s; }
        
        .header-island { border-radius: 28px; margin: 20px 24px; padding: 15px 24px; display: flex; flex-wrap: wrap; gap: 15px; }
        .header-island .header-left, .header-island .header-right { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; }
        
        .nav-pill-lulu { border-radius: 20px; font-weight: 600; padding: 6px 18px; border: 1.5px solid var(--lulu-green); background: transparent; color: var(--lulu-green); transition: 0.3s; font-size: 12px; white-space: nowrap; }
        .nav-pill-lulu.active { background: var(--lulu-green); color: white; border-color: var(--lulu-green); }

        .kpi-container { border-radius: 24px; padding: 24px; text-align: left; position: relative; overflow: hidden; height: 100%; transition: transform 0.2s, border-color 0.2s; }
        .kpi-container:hover { transform: translateY(-4px); border-color: var(--lulu-green); }
        .kpi-val { font-size: 1.7rem; font-weight: 800; color: var(--text-main); margin-top: 8px; letter-spacing: -0.5px;}
        .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }

        .matrix-card { border-radius: 28px; overflow: hidden; margin-bottom: 24px; }
        
        .table { color: var(--text-main); margin-bottom: 0; min-width: 600px; }
        .table thead th { background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); padding: 16px 20px; letter-spacing: 0.5px; white-space: nowrap; }
        .table tbody td { border-bottom: 1px solid var(--glass-border); padding: 14px 20px; font-size: 13px; font-weight: 500; }
        .table-hover tbody tr { transition: background-color 0.2s ease; }
        .table-hover tbody tr:hover { background-color: var(--table-hover) !important; }
        
        .fade-transition { transition: opacity 0.2s ease, transform 0.2s ease; opacity: 1; transform: translateY(0); }
        .fade-out { opacity: 0; transform: translateY(8px); }

        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: var(--lulu-green); }
        .sort-icon { font-size: 10px; margin-left: 5px; opacity: 0.5; }
        .sort-active { color: var(--lulu-green); font-weight: 700; opacity: 1; }

        .num { text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 600; white-space: nowrap; }
        
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
        .bg-up { background: var(--pill-up-bg); color: var(--success); }
        .bg-down { background: var(--pill-down-bg); color: var(--danger); }
        
        .cascade-select, .form-control { border-radius: 14px; border: 1px solid var(--input-border); font-size: 12px; font-weight: 500; background: var(--input-bg); color: var(--text-main); transition: all 0.2s ease; }
        .cascade-select:focus, .form-control:focus { border-color: var(--lulu-green); box-shadow: 0 0 0 4px rgba(0, 166, 66, 0.1); background: var(--glass-bg); }
        
        .dropdown-menu-custom { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 16px; max-height: 300px; overflow-y: auto; padding: 6px; }
        .dropdown-menu-custom label, .dropdown-item-custom { display: block; padding: 8px 12px; cursor: pointer; color: var(--text-main); font-size: 12px; font-weight: 500; border-radius: 10px; transition: 0.2s; margin-bottom: 2px; }
        .dropdown-menu-custom label:hover, .dropdown-item-custom:hover { background: var(--table-hover); color: var(--lulu-green); }
        .dropdown-menu-custom input[type="checkbox"] { margin-right: 10px; accent-color: var(--lulu-green); transform: scale(1.1); }
        .dropdown-search { background: transparent; border-bottom: 1px solid var(--glass-border) !important; border-radius: 0; padding-left: 8px; }

        .clickable-row { cursor: pointer; }
        .clickable-row td:first-child { color: var(--text-main); font-weight: 600; }
        .clickable-row:hover td:first-child { color: var(--lulu-green); }

        .ai-card { border-left: none; border-top: 4px solid var(--lulu-green); }
        .ai-search-input { border-radius: 20px 0 0 20px !important; font-weight: 500; font-size: 14px; padding-left: 20px; border-color: var(--lulu-green); }
        .ai-btn-search { border-radius: 0; font-weight: 600; padding: 0 24px; background: var(--lulu-green); color: white; border-color: var(--lulu-green); }
        .ai-btn-clear { border-radius: 0 20px 20px 0 !important; font-weight: 600; }
        
        .ai-suggestion { font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--lulu-green); background: transparent; color: var(--lulu-green); border-radius: 15px; padding: 5px 14px; transition: all 0.2s; white-space: nowrap; }
        .ai-suggestion:hover { background: var(--lulu-green); color: white; transform: scale(1.02); }

        .autocomplete-item { cursor: pointer; font-size: 13px; font-weight: 500; background: transparent; color: var(--text-main); border-bottom: 1px solid var(--glass-border) !important; }
        .autocomplete-item:hover { background-color: var(--table-hover); color: var(--lulu-green); }

        .glass-panel { background: var(--drill-bg); border: 1px solid var(--glass-border); border-radius: 16px; }
        .sidebar-sticky { position: sticky; top: 20px; height: calc(100vh - 40px); overflow-y: auto; overflow-x: hidden; border-radius: 28px; }
        .chart-scroll-wrapper { overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
        
        .transition-layout { transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), padding 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        @media (max-width: 991.98px) {
            .sidebar-sticky { position: relative; height: auto; top: 0; margin-bottom: 20px; }
            .header-island { margin: 15px; padding: 15px; flex-direction: column; align-items: stretch; border-radius: 24px; }
            .header-island .header-left, .header-island .header-right { justify-content: space-between; width: 100%; }
            #sidebarCol.d-none { display: none !important; }
        }
        
        @media (max-width: 767.98px) {
            .header-left { flex-direction: column; align-items: flex-start !important; gap: 10px !important; }
            .header-right { flex-direction: column; align-items: stretch !important; gap: 10px !important; }
            .header-right > div { justify-content: space-between; }
            #upload { width: 100% !important; max-width: none !important; }
            .nav-pill-lulu { flex: 1; text-align: center; padding: 8px 10px; }
            .kpi-container { padding: 15px; border-radius: 20px; }
            .kpi-val { font-size: 1.4rem; }
            .glass-panel { width: 100%; justify-content: space-between; }
        }

        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(0.5); }
        [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
    </style>
</head>
<body>

<div class="header-island bento-glass mb-4">
    <div class="header-left">
        <div style="font-weight:800; font-size:1.6rem; letter-spacing: -0.5px;">
            <span style="color:var(--lulu-green);">LuLu</span> 
            <span style="font-weight: 400;">Intelligence</span>
        </div>
        
        <button class="btn btn-sm btn-outline-success rounded-pill fw-bold ms-lg-2" onclick="toggleSidebar()" style="font-size: 12px; border-width: 1.5px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            Toggle Filters
        </button>

        <div class="d-flex gap-1 w-100 mt-2 mt-md-0" style="max-width: 300px;">
            <button id="btnMoM" class="nav-pill-lulu active" onclick="setMode('MoM')">MoM</button>
            <button id="btnYoY" class="nav-pill-lulu" onclick="setMode('YoY')">YoY</button>
            <button id="btnCustom" class="nav-pill-lulu" onclick="setMode('Custom')">Custom</button>
        </div>
    </div>
    
    <div class="header-right">
        <div class="d-flex align-items-center glass-panel px-3 py-2 py-md-1">
            <span class="small fw-bold text-muted me-2">Metric:</span>
            <select id="metric" class="form-select form-select-sm border-0 bg-transparent fw-bold text-success" style="width:130px; padding-left:0; cursor:pointer; box-shadow:none;" onchange="runAnalysis()">
                <option value="Sales Value">Sales (AED)</option>
                <option value="Sold Qty">Sold Quantity</option>
            </select>
            <div style="width: 1px; height: 16px; background: var(--glass-border); margin: 0 12px;"></div>
            <button class="btn btn-sm btn-dark rounded-pill fw-bold px-3 shadow-sm" onclick="toggleTheme()" id="themeBtn" style="font-size: 11px; white-space: nowrap;">Dark Mode</button>
        </div>
        <input type="file" id="upload" class="form-control form-control-sm" style="width:100%; max-width:220px;">
    </div>
</div>

<div class="container-fluid px-2 px-md-4 pb-5 mb-5" id="dashboard" style="display:none">
    <div class="row g-3 g-md-4">
        
        <div class="col-12 col-lg-4 col-xl-3 transition-layout" id="sidebarCol">
            <div class="bento-glass p-3 p-md-4 sidebar-sticky">
                <h5 class="fw-bold mb-4 d-flex align-items-center" style="color: var(--lulu-green);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Master Controls
                </h5>
                
                <h6 class="fw-bold mb-3">Time Selection</h6>
                
                <div class="glass-panel p-3 mb-3">
                    <label class="small fw-bold text-success mb-2">Target Period (A)</label>
                    <div id="monthlyBoxA">
                        <div class="mb-2"><select id="selYear" class="form-select cascade-select" onchange="renderMonthSelection()"></select></div>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" id="btn_TargetMonth">Select Months</button>
                            <div class="dropdown-menu dropdown-menu-custom shadow" id="f_TargetMonth"></div>
                        </div>
                    </div>
                    
                    <div id="dailyBoxA" style="display:none;">
                        <span class="d-block text-muted mb-1" style="font-size:10px; font-weight:600;">START DATE</span>
                        <input type="date" id="dateStartA" class="form-control form-control-sm mb-2" onchange="updateDailyPeriodB(); runAnalysis();">
                        <span class="d-block text-muted mb-1" style="font-size:10px; font-weight:600;">END DATE</span>
                        <input type="date" id="dateEndA" class="form-control form-control-sm" onchange="updateDailyPeriodB(); runAnalysis();">
                    </div>
                </div>

                <div id="customTimeBox" class="glass-panel p-3 mb-3" style="display: none;">
                    <label class="small fw-bold text-warning mb-2" style="color: #d4a106 !important;">Comparison Period (B)</label>
                    <div id="monthlyBoxB">
                        <div class="mb-2"><select id="selPrevYear" class="form-select cascade-select" onchange="renderPrevMonthSelection()"></select></div>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" id="btn_PrevMonth">Select Months</button>
                            <div class="dropdown-menu dropdown-menu-custom shadow" id="f_PrevMonth"></div>
                        </div>
                    </div>
                    <div id="dailyBoxB" style="display:none;">
                        <span class="d-block text-muted mb-1" style="font-size:10px; font-weight:600;">START DATE</span>
                        <input type="date" id="dateStartB" class="form-control form-control-sm mb-2" onchange="runAnalysis();">
                        <span class="d-block text-muted mb-1" style="font-size:10px; font-weight:600;">END DATE</span>
                        <input type="date" id="dateEndB" class="form-control form-control-sm" onchange="runAnalysis();">
                    </div>
                </div>
                
                <hr class="my-4" style="border-color: var(--glass-border);">
                <h6 class="fw-bold mb-3">Dynamic Hierarchy</h6>
                
                <div class="mb-3" id="filter_Country_container">
                    <label class="small fw-bold text-muted mb-1">1. Country</label>
                    <div class="dropdown"><button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" id="btn_Country">All Countries</button><div class="dropdown-menu dropdown-menu-custom shadow" id="f_Country"></div></div>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted mb-1">2. Department</label>
                    <div class="dropdown"><button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" id="btn_Department">All Departments</button><div class="dropdown-menu dropdown-menu-custom shadow" id="f_Department"></div></div>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted mb-1">3. Category</label>
                    <div class="dropdown"><button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" id="btn_Category" data-value="All">All Categories</button><div class="dropdown-menu dropdown-menu-custom shadow" id="f_Category"></div></div>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted mb-1">4. Material Group</label>
                    <div class="dropdown"><button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" id="btn_MaterialGroup" data-value="All">All Material Groups</button><div class="dropdown-menu dropdown-menu-custom shadow" id="f_MaterialGroup"></div></div>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted mb-1">5. Brand</label>
                    <div class="dropdown"><button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" id="btn_Brand" data-value="All">All Brands</button><div class="dropdown-menu dropdown-menu-custom shadow" id="f_Brand"></div></div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8 col-xl-9 transition-layout" id="mainCol">
            
            <div class="row g-3 g-md-4 mb-4">
                <div class="col-6 col-md-6 col-xl-3"><div class="kpi-container bento-glass"><div class="kpi-label" id="lblKpiCur">Target Period</div><div id="kpiCurrent" class="kpi-val fade-transition">0</div></div></div>
                <div class="col-6 col-md-6 col-xl-3"><div class="kpi-container bento-glass"><div class="kpi-label" id="lblKpiPrev">Comparison Period</div><div id="kpiPrev" class="kpi-val fade-transition">0</div></div></div>
                <div class="col-6 col-md-6 col-xl-3"><div class="kpi-container bento-glass"><div class="kpi-label">Variance Value</div><div id="kpiVar" class="kpi-val fade-transition">0</div></div></div>
                <div class="col-6 col-md-6 col-xl-3"><div class="kpi-container bento-glass"><div class="kpi-label">Growth Trend</div><div id="kpiPct" class="kpi-val fade-transition" style="font-size: 1.8rem;">0%</div></div></div>
            </div>

            <div class="ai-card bento-glass">
                <div class="d-flex align-items-center mb-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-success me-2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <h6 class="fw-bold mb-0 text-success">Smart Ask Agent</h6>
                </div>
                <div class="input-group mt-3 shadow-sm rounded-pill position-relative">
                    <input type="text" id="aiSearchBox" class="form-control ai-search-input" placeholder="Ask anything (e.g., 'top 10 brands', 'show product 10452')..." autocomplete="off">
                    <button class="btn ai-btn-search" onclick="processSmartSearch()">Analyze</button>
                    <button class="btn btn-outline-danger ai-btn-clear" style="border-width:1px;" onclick="clearSmartSearch()">Clear</button>
                    <ul id="autocomplete-list" class="list-group position-absolute w-100 shadow-lg rounded-4 border-0 bento-glass" style="display: none; z-index: 1050; max-height: 250px; overflow-y: auto; top: 110%;"></ul>
                </div>
                <div id="aiSuggestions" class="mt-3 d-flex flex-wrap gap-2"></div>
            </div>

            <div class="matrix-card bento-glass p-3 p-md-4">
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-2">
                    <h6 class="fw-bold mb-0" style="color: var(--text-main);">Comparative Performance</h6>
                    <select id="chartTypeSelector" class="form-select form-select-sm w-auto fw-bold" style="background: var(--drill-bg); color: var(--text-main); border-color: var(--glass-border); border-radius: 10px;" onchange="updateChartType()">
                        <option value="bar">Bar Chart</option>
                        <option value="line">Line Chart</option>
                        <option value="area">Area Chart</option>
                    </select>
                </div>
                <div class="chart-scroll-wrapper">
                    <div id="mainChart" class="fade-transition"></div>
                </div>
            </div>

            <div class="matrix-card bento-glass">
                <div class="p-3 border-bottom d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3" style="background: transparent; border-color: var(--glass-border) !important;">
                    <div class="d-flex align-items-center gap-2 w-100 w-sm-auto">
                        <span class="fw-bold text-muted small text-uppercase flex-shrink-0">Table View</span>
                        <div class="d-flex align-items-center gap-1 w-100">
                            <select id="tableFilterMode" class="form-select form-select-sm fw-bold border-0 text-success" style="width:100px; background: var(--drill-bg); border-radius: 10px;" onchange="toggleTableCount()">
                                <option value="all" selected>Show All</option>
                                <option value="top">Top</option>
                                <option value="bottom">Bottom</option>
                            </select>
                            <input type="number" id="tableFilterCount"

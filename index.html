<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LuLu BI: Executive Master Dashboard</title>
    
    <!-- Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES --- */
        :root { 
            --lulu-green: #008334; 
            --bg: #f0f2f5; 
            --text-main: #1a1a1a;
            --text-muted: #636e72;
            --card-bg: #ffffff;
            --border-color: #eee;
            --table-hover: #eef7f1;
            --success: #2e7d32; 
            --danger: #d32f2f; 
            --header-bg: #ffffff;
            --input-bg: #ffffff;
            --input-border: #e0e0e0;
            --ai-bg: linear-gradient(145deg, #f0fdf4, #ffffff);
            --drill-bg: #f8f9fa;
            --pill-up-bg: #e6f4ea;
            --pill-down-bg: #fce8e6;
        }

        [data-theme="dark"] {
            --lulu-green: #00e676; 
            --bg: #121212;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --table-hover: #1a2e22;
            --success: #00e676;
            --danger: #ff5252;
            --header-bg: #1e1e1e;
            --input-bg: #2c2c2c;
            --input-border: #444444;
            --ai-bg: linear-gradient(145deg, #1a2e22, #1e1e1e);
            --drill-bg: #252525;
            --pill-up-bg: #0b2e13;
            --pill-down-bg: #3b1114;
        }

        body { background: var(--bg); color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 13px; transition: background 0.3s, color 0.3s; }
        
        .header { background: var(--header-bg); border-bottom: 5px solid var(--lulu-green); border-radius: 0 0 30px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: background 0.3s; }
        .nav-pill-lulu { border-radius: 20px; font-weight: 700; padding: 8px 20px; border: 2px solid var(--lulu-green); background: transparent; color: var(--lulu-green); transition: 0.3s; }
        .nav-pill-lulu.active { background: var(--lulu-green); color: white; }

        .kpi-container { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.03); transition: transform 0.3s, background 0.3s, border-color 0.3s; border-bottom: 4px solid var(--border-color); }
        .kpi-container:hover { border-bottom-color: var(--lulu-green); transform: translateY(-3px); }
        .kpi-val { font-size: 1.45rem; font-weight: 800; color: var(--text-main); margin-top: 5px; transition: color 0.3s;}

        .matrix-card { background: var(--card-bg); border-radius: 25px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.05); transition: background 0.3s; }
        .table { color: var(--text-main); transition: color 0.3s; }
        .table thead th { background: var(--drill-bg); color: var(--text-muted); font-size: 11px; text-transform: uppercase; border: none; padding: 15px; transition: background 0.3s, color 0.3s; }
        .table-hover tbody tr:hover { background-color: var(--table-hover) !important; color: var(--text-main); }
        
        .fade-transition { transition: opacity 0.15s ease-in-out, transform 0.15s ease-in-out; opacity: 1; transform: translateY(0); }
        .fade-out { opacity: 0; transform: translateY(10px); }

        .sortable { cursor: pointer; transition: 0.2s; user-select: none; }
        .sortable:hover { color: var(--lulu-green); }
        .sort-icon { font-size: 10px; margin-left: 5px; color: var(--text-muted); }
        .sort-active { color: var(--lulu-green); font-weight: 800; }

        .num { text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; white-space: nowrap; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .bg-up { background: var(--pill-up-bg); color: var(--success); }
        .bg-down { background: var(--pill-down-bg); color: var(--danger); }
        
        .cascade-select { border-radius: 10px; border: 1px solid var(--input-border); font-size: 12px; font-weight: 600; width: 100%; background-color: var(--input-bg); color: var(--text-main); transition: background 0.3s, color 0.3s, border-color 0.3s; }
        .cascade-select:focus { border-color: var(--lulu-green); box-shadow: 0 0 0 3px rgba(0,131,52,0.1); }
        
        .dropdown-menu-custom { background: var(--card-bg); max-height: 250px; overflow-y: auto; font-size: 12px; width: 100%; border-color: var(--border-color); }
        .dropdown-menu-custom label { display: block; padding: 5px 10px; cursor: pointer; color: var(--text-main); }
        .dropdown-menu-custom label:hover { background: var(--drill-bg); }
        .dropdown-menu-custom input { margin-right: 8px; accent-color: var(--lulu-green); }

        .clickable-row { cursor: pointer; transition: background-color 0.2s; }
        .clickable-row td:first-child { color: var(--lulu-green); text-decoration: underline; text-decoration-color: var(--lulu-green); text-underline-offset: 4px; }

        .ai-card { background: var(--ai-bg); border-left: 5px solid var(--lulu-green); border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 20px; transition: background 0.3s; }
        .ai-search-input { border-radius: 20px 0 0 20px !important; font-weight: 600; font-size: 14px; padding-left: 20px; background: var(--input-bg); color: var(--text-main); border-color: var(--lulu-green); z-index: 2; }
        .ai-btn-search { border-radius: 0; font-weight: 700; padding: 0 25px; background: var(--lulu-green); color: white; border-color: var(--lulu-green); z-index: 2; }
        .ai-btn-clear { border-radius: 0 20px 20px 0 !important; font-weight: 700; z-index: 2;}
        
        .ai-suggestion { font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--lulu-green); background: transparent; color: var(--lulu-green); border-radius: 15px; padding: 4px 12px; transition: 0.2s; white-space: nowrap; }
        .ai-suggestion:hover { background: var(--lulu-green); color: white; transform: translateY(-2px); }

        .autocomplete-item { cursor: pointer; font-size: 13px; font-weight: 500; background-color: var(--card-bg); color: var(--text-main); border-color: var(--border-color); }
        .autocomplete-item:hover { background-color: var(--table-hover); color: var(--lulu-green); }
        [data-theme="dark"] .autocomplete-item:hover { background-color: var(--table-hover); }

        .offcanvas { background-color: var(--card-bg); color: var(--text-main); }
        .offcanvas-header { border-bottom-color: var(--border-color) !important; }
        .btn-close { filter: invert(var(--invert-icon, 0)); }
        [data-theme="dark"] { --invert-icon: 1; } 
        [data-theme="dark"] .text-dark { color: #ffffff !important; }
        [data-theme="dark"] .bg-light { background-color: var(--drill-bg) !important; color: var(--text-main) !important; }
        [data-theme="dark"] .text-muted { color: var(--text-muted) !important; }
    </style>
</head>
<body>

<div class="header p-4 mb-4">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <div style="color:var(--lulu-green); font-weight:800; font-size:1.8rem;">LuLu <span class="text-dark fw-light">Intelligence</span></div>
            <button class="btn btn-outline-success rounded-pill fw-bold" style="border-width: 2px;" data-bs-toggle="offcanvas" data-bs-target="#filterSidebar">⚙️ Data Controls</button>
            <div class="d-flex gap-2">
                <button id="btnMoM" class="nav-pill-lulu active" onclick="setMode('MoM')">MoM</button>
                <button id="btnYoY" class="nav-pill-lulu" onclick="setMode('YoY')">YoY</button>
                <button id="btnCustom" class="nav-pill-lulu" onclick="setMode('Custom')">Custom</button>
            </div>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <div class="d-flex align-items-center bg-light p-2 rounded-4 border" style="border-color: var(--border-color) !important;">
                <select id="metric" class="form-select form-select-sm border-0 bg-transparent fw-bold text-success" onchange="runAnalysis()">
                    <option value="Sales Value">Sales (AED)</option>
                    <option value="Sold Qty">Sold Quantity</option>
                </select>
                <button class="btn btn-sm btn-dark rounded-pill ms-2 fw-bold" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            </div>
            <input type="file" id="upload" class="form-control" style="width:250px; border-radius:20px; background: var(--input-bg); color: var(--text-main); border-color: var(--input-border);">
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start shadow-lg border-0" tabindex="-1" id="filterSidebar">
    <div class="offcanvas-header p-4">
        <h5 class="fw-bold mb-0" style="color: var(--lulu-green);">⚙️ Master Controls</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-4">
        <h6 class="fw-bold mb-3">📅 Time Selection</h6>
        
        <!-- TARGET PERIOD MULTI-SELECT -->
        <div class="p-3 border rounded bg-light mb-3" style="border-color: var(--border-color) !important;">
            <label class="small fw-bold text-success mb-2">Target Period (A)</label>
            <div class="mb-2">
                <select id="selYear" class="form-select cascade-select" onchange="renderMonthSelection()"></select>
            </div>
            <div class="dropdown">
                <button class="btn btn-outline-secondary w-100 text-start cascade-select bg-white" type="button" data-bs-toggle="dropdown" id="btn_TargetMonth">Select Months</button>
                <div class="dropdown-menu dropdown-menu-custom shadow" id="f_TargetMonth" onclick="event.stopPropagation()"></div>
            </div>
        </div>

        <!-- COMPARISON PERIOD MULTI-SELECT -->
        <div id="customTimeBox" class="p-3 border rounded mb-3" style="display: none; background: #fff8e1; border-color: #ffe082 !important;">
            <label class="small fw-bold text-warning mb-2" style="color: #d4a106 !important;">Comparison Period (B)</label>
            <div class="mb-2">
                <select id="selPrevYear" class="form-select cascade-select" onchange="renderPrevMonthSelection()"></select>
            </div>
            <div class="dropdown">
                <button class="btn btn-outline-secondary w-100 text-start cascade-select bg-white" type="button" data-bs-toggle="dropdown" id="btn_PrevMonth">Select Months</button>
                <div class="dropdown-menu dropdown-menu-custom shadow" id="f_PrevMonth" onclick="event.stopPropagation()"></div>
            </div>
        </div>
        
        <hr class="my-4" style="border-color: var(--border-color);">
        
        <h6 class="fw-bold mb-3">🔗 Dynamic Hierarchy</h6>
        <div class="mb-3">
            <label class="small fw-bold text-muted">1. Country (Multi)</label>
            <div class="dropdown">
                <button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" id="btn_Country">All Countries</button>
                <div class="dropdown-menu dropdown-menu-custom shadow" id="f_Country" onclick="event.stopPropagation()"></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="small fw-bold text-muted">2. Department (Multi)</label>
            <div class="dropdown">
                <button class="btn btn-outline-secondary w-100 text-start cascade-select" type="button" data-bs-toggle="dropdown" id="btn_Department">All Departments</button>
                <div class="dropdown-menu dropdown-menu-custom shadow" id="f_Department" onclick="event.stopPropagation()"></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="small fw-bold text-muted">3. Category</label>
            <select id="f_Category" class="form-select cascade-select" onchange="cascadeUpdate(3)"></select>
        </div>
        <div class="mb-3">
            <label class="small fw-bold text-muted">4. Material Group</label>
            <select id="f_MaterialGroup" class="form-select cascade-select" onchange="cascadeUpdate(4)"></select>
        </div>
        <div class="mb-3">
            <label class="small fw-bold text-muted">5. Brand</label>
            <select id="f_Brand" class="form-select cascade-select" onchange="runAnalysis()"></select>
        </div>
    </div>
</div>

<div class="container-fluid px-4 pb-5 mb-5" id="dashboard" style="display:none">
    
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="kpi-container"><small class="fw-bold text-muted text-uppercase" id="lblKpiCur">Target Period</small><div id="kpiCurrent" class="kpi-val fade-transition">0</div></div></div>
        <div class="col-md-3"><div class="kpi-container"><small class="fw-bold text-muted text-uppercase" id="lblKpiPrev">Comparison Period</small><div id="kpiPrev" class="kpi-val fade-transition">0</div></div></div>
        <div class="col-md-3"><div class="kpi-container"><small class="fw-bold text-muted text-uppercase">Variance</small><div id="kpiVar" class="kpi-val fade-transition">0</div></div></div>
        <div class="col-md-3"><div class="kpi-container"><small class="fw-bold text-muted text-uppercase">Growth %</small><div id="kpiPct" class="kpi-val fade-transition" style="font-size: 1.8rem;">0%</div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-12">
            
            <div class="ai-card">
                <div class="d-flex align-items-center mb-2">
                    <span class="fs-4 me-2">🔍</span>
                    <h6 class="fw-bold mb-0 text-success">LuLu Smart Ask Agent</h6>
                </div>
                <div class="input-group mt-2 shadow-sm rounded-pill position-relative">
                    <input type="text" id="aiSearchBox" class="form-control ai-search-input" placeholder="Type to search (e.g., 'top 10 brands in rice', 'apple', 'electronics')..." autocomplete="off">
                    <button class="btn ai-btn-search" onclick="processSmartSearch()">Search</button>
                    <button class="btn btn-outline-danger ai-btn-clear" onclick="clearSmartSearch()">Clear</button>
                    
                    <ul id="autocomplete-list" class="list-group position-absolute w-100 shadow rounded-4 border-0" style="display: none; z-index: 1050; max-height: 250px; overflow-y: auto; top: 110%;"></ul>
                </div>
                <div id="aiSuggestions" class="mt-3 d-flex flex-wrap gap-2"></div>
            </div>

            <div class="matrix-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold text-muted mb-0">Comparative Performance Chart</h6>
                    <select id="chartTypeSelector" class="form-select form-select-sm w-auto fw-bold" style="background: var(--input-bg); color: var(--text-main); border-color: var(--input-border);" onchange="updateChartType()">
                        <option value="bar">Bar Chart</option>
                        <option value="line">Line Chart</option>
                        <option value="area">Area Chart</option>
                    </select>
                </div>
                <div id="mainChart" class="fade-transition"></div>
            </div>

            <div class="matrix-card">
                <div class="table-responsive">
                    <div class="bg-light p-3 border-bottom d-flex justify-content-between align-items-center" id="drillDownHeader" style="display:none !important; border-color: var(--border-color) !important;">
                        <span class="fw-bold text-dark ps-2 fs-6" id="drillDownTitle"></span>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary rounded-pill fw-bold me-2" onclick="stepBackDrill()" id="btnStepBack">🔙 Step Back</button>
                            <button class="btn btn-sm btn-outline-danger rounded-pill fw-bold" onclick="clearAllDrill()">🏠 Reset View</button>
                        </div>
                    </div>
                    <table class="table mb-0 align-middle table-hover">
                        <thead>
                            <tr>
                                <th class="ps-4" id="thDimName">Performance Dimension</th>
                                <th class="num sortable" onclick="toggleSort('cur')" id="thCur">Target <span class="sort-icon" id="icn-cur">▼</span></th>
                                <th class="num sortable" onclick="toggleSort('prev')" id="thPrev">Comparison <span class="sort-icon" id="icn-prev"></span></th>
                                <th class="num sortable" onclick="toggleSort('var')">Variance <span class="sort-icon" id="icn-var"></span></th>
                                <th class="num pe-4 sortable" onclick="toggleSort('pct')">Trend % <span class="sort-icon" id="icn-pct"></span></th>
                            </tr>
                        </thead>
                        <tbody id="dataTable" class="fade-transition"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let rows = [], yearMonthMap = {}, chart, mode = 'MoM';
const monthOrder = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const hierarchyConfig = ["Country", "Department", "Category", "Material Group", "Brand"];
const drillHierarchy = ["Country", "Department", "Category", "Material Group", "Brand", "Product Name"];

let sortConfig = { col: 'cur', dir: 'desc' };
let currentAggLevel = "Department";
let drillDownStack = []; 
let searchConfig = { isActive: false, limit: 100, forceLevel: null, keyword: null };
let suggestedQueries = []; 

function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    if (isDark) {
        body.removeAttribute('data-theme');
        document.getElementById('themeBtn').innerText = '🌙 Dark Mode';
        updateChartTheme('light');
    } else {
        body.setAttribute('data-theme', 'dark');
        document.getElementById('themeBtn').innerText = '☀️ Light Mode';
        updateChartTheme('dark');
    }
}

function updateChartTheme(themeMode) {
    if(chart) {
        chart.updateOptions({
            theme: { mode: themeMode },
            chart: { background: 'transparent' },
            colors: themeMode === 'dark' ? ['#00e676', '#7f8fa6'] : ['#008334', '#b2bec3']
        });
    }
}

function formatValue(value, isCurrency, isGraphic = false) {
    const decimals = isGraphic ? 2 : 0;
    if (isCurrency) {
        return new Intl.NumberFormat('en-AE', { style: 'currency', currency: 'AED', currencyDisplay: 'code', currencySign: 'accounting', minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(value);
    } else {
        return new Intl.NumberFormat('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(value);
    }
}

upload.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: "array"});
            const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            rows = [];
            
            if (raw.length > 0 && raw[0].hasOwnProperty("Calendar Year/Month")) {
                rows = raw.filter(r => r["Calendar Year/Month"]).map(r => {
                    const ym = String(r["Calendar Year/Month"]).trim();
                    const parts = ym.split(/\s+/);
                    const m3 = parts[0].substring(0,3).toUpperCase();
                    return { ...r, _month: m3, _year: parts[1], "Calendar Year/Month": `${m3} ${parts[1]}` };
                });
            } else {
                raw.forEach(row => {
                    Object.keys(row).forEach(key => {
                        const kUpper = String(key).toUpperCase().trim();
                        if (monthOrder.some(m => kUpper.startsWith(m))) {
                            const parts = kUpper.split(/\s+/);
                            if (parts.length >= 2) {
                                const m3 = parts[0].substring(0,3);
                                rows.push({ ...row, "Calendar Year/Month": `${m3} ${parts[1]}`, _month: m3, _year: parts[1], "Sales Value": parseFloat(row[key]) || 0 });
                            }
                        }
                    });
                });
            }

            if(!chart) initChart();
            buildTimeMap();
            initUI();
            
            populateMultiSelect('Country', rows);
            populateMultiSelect('Department', rows);
            cascadeUpdate(2); 
            
            buildSearchableTerms();
            generateRecommendations();
            
            document.getElementById('dashboard').style.display = 'block';
        } catch (err) { alert("Error reading Excel file."); }
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

function buildSearchableTerms() {
    const depts = [...new Set(rows.map(r => r.Department))].filter(Boolean);
    const cats = [...new Set(rows.map(r => r.Category))].filter(Boolean);
    const brands = [...new Set(rows.map(r => r.Brand))].filter(Boolean);
    
    suggestedQueries = [];
    brands.forEach(b => suggestedQueries.push({ text: `Top 10 products in ${b}`, type: 'Brand Filter' }));
    cats.forEach(c => suggestedQueries.push({ text: `Top 5 brands in ${c}`, type: 'Category Filter' }));
    depts.forEach(d => suggestedQueries.push({ text: `Top categories in ${d}`, type: 'Department Filter' }));
}

document.getElementById('aiSearchBox').addEventListener('input', function(e) {
    const val = this.value.toLowerCase().trim();
    const list = document.getElementById('autocomplete-list');
    list.innerHTML = '';
    
    if (!val || val.length < 2) {
        list.style.display = 'none';
        return;
    }

    const matches = suggestedQueries.filter(q => q.text.toLowerCase().includes(val)).slice(0, 6);
    
    if (matches.length > 0) {
        list.style.display = 'block';
        matches.forEach(match => {
            const li = document.createElement('li');
            li.className = 'list-group-item list-group-item-action autocomplete-item border-0 border-bottom';
            const regex = new RegExp(`(${val})`, "gi");
            const highlightedText = match.text.replace(regex, "<span class='text-success fw-bold'>$1</span>");
            li.innerHTML = `<span>🔍 ${highlightedText}</span> <span class="badge bg-light text-muted float-end" style="font-size:10px;">${match.type}</span>`;
            li.onclick = () => {
                document.getElementById('aiSearchBox').value = match.text;
                list.style.display = 'none';
                processSmartSearch();
            };
            list.appendChild(li);
        });
    } else {
        list.style.display = 'none';
    }
});

document.addEventListener('click', function (e) {
    if (e.target.id !== 'aiSearchBox') {
        const list = document.getElementById('autocomplete-list');
        if(list) list.style.display = 'none';
    }
});

function generateRecommendations() {
    if (!rows.length) return;
    const depts = [...new Set(rows.map(r => r.Department))].filter(Boolean);
    const cats = [...new Set(rows.map(r => r.Category))].filter(Boolean);
    const brands = [...new Set(rows.map(r => r.Brand))].filter(Boolean);
    const getRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    let suggestions = [];
    if (brands.length > 0) suggestions.push(`Top 10 products in ${getRandom(brands)}`);
    if (cats.length > 0) suggestions.push(`Top 5 brands in ${getRandom(cats)}`);
    if (depts.length > 0) suggestions.push(`Top categories in ${getRandom(depts)}`);
    suggestions.push(`Top 50 items`);

    document.getElementById('aiSuggestions').innerHTML = suggestions.map(s => 
        `<span class="ai-suggestion" onclick="applySuggestion('${s.replace(/'/g, "\\'")}')">✨ ${s}</span>`
    ).join("");
}

function applySuggestion(text) {
    document.getElementById('aiSearchBox').value = text;
    processSmartSearch();
}

function buildTimeMap() {
    yearMonthMap = {};
    rows.forEach(r => {
        if(r._year && r._month) {
            if(!yearMonthMap[r._year]) yearMonthMap[r._year] = new Set();
            yearMonthMap[r._year].add(r._month);
        }
    });
}

function initUI() {
    const years = Object.keys(yearMonthMap).sort();
    if (!years.length) return;
    
    const sy = document.getElementById('selYear');
    sy.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
    sy.value = years[years.length - 1];
    
    const spy = document.getElementById('selPrevYear');
    spy.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
    spy.value = years[Math.max(0, years.length - 2)]; 
    
    renderMonthSelection();
    renderPrevMonthSelection();
}

// --- NEW MULTI-MONTH RENDER LOGIC ---
function updateTimeBtnText(type) {
    const checked = Array.from(document.querySelectorAll(`#f_${type} input:checked`)).map(cb => cb.value);
    const btn = document.getElementById(`btn_${type}`);
    if (checked.length === 0) btn.innerText = `Select Month`;
    else if (checked.length === 1) btn.innerText = checked[0];
    else btn.innerText = `${checked.length} Months Selected`;
}

function renderMonthSelection() {
    const y = document.getElementById('selYear').value;
    const container = document.getElementById('f_TargetMonth');
    if (!yearMonthMap[y]) {
        container.innerHTML = '';
        updateTimeBtnText('TargetMonth');
        runAnalysis();
        return;
    }
    const available = [...yearMonthMap[y]].sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));
    container.innerHTML = available.map((m, i) => 
        `<label><input type="checkbox" value="${m}" ${i === available.length - 1 ? 'checked' : ''} onchange="updateTimeBtnText('TargetMonth'); runAnalysis()"> ${m}</label>`
    ).join("");
    updateTimeBtnText('TargetMonth');
    runAnalysis();
}

function renderPrevMonthSelection() {
    const y = document.getElementById('selPrevYear').value;
    const container = document.getElementById('f_PrevMonth');
    if (!yearMonthMap[y]) {
        container.innerHTML = '';
        updateTimeBtnText('PrevMonth');
        if (mode === 'Custom') runAnalysis();
        return;
    }
    const available = [...yearMonthMap[y]].sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));
    container.innerHTML = available.map((m, i) => 
        `<label><input type="checkbox" value="${m}" ${i === available.length - 1 ? 'checked' : ''} onchange="updateTimeBtnText('PrevMonth'); runAnalysis()"> ${m}</label>`
    ).join("");
    updateTimeBtnText('PrevMonth');
    if(mode === 'Custom') runAnalysis();
}

function setMode(m) {
    mode = m;
    document.getElementById('btnMoM').classList.toggle('active', m === 'MoM');
    document.getElementById('btnYoY').classList.toggle('active', m === 'YoY');
    document.getElementById('btnCustom').classList.toggle('active', m === 'Custom');
    document.getElementById('customTimeBox').style.display = (m === 'Custom') ? 'block' : 'none';
    runAnalysis();
}

function processSmartSearch() {
    document.getElementById('autocomplete-list').style.display = 'none'; 
    let query = document.getElementById('aiSearchBox').value.toLowerCase().trim();
    if(!query) { clearSmartSearch(); return; }

    searchConfig.isActive = true;
    searchConfig.limit = 100;
    searchConfig.forceLevel = null;
    searchConfig.keyword = null;
    drillDownStack = []; 

    const limitMatch = query.match(/top\s+(\d+)/);
    if(limitMatch) {
        searchConfig.limit = parseInt(limitMatch[1]);
        query = query.replace(limitMatch[0], ''); 
    }

    if (query.includes('brand')) { searchConfig.forceLevel = 'Brand'; query = query.replace(/brands?/g, ''); }
    else if (query.includes('product') || query.includes('item')) { searchConfig.forceLevel = 'Product Name'; query = query.replace(/products?|items?/g, ''); }
    else if (query.includes('categor')) { searchConfig.forceLevel = 'Category'; query = query.replace(/categories|category/g, ''); }
    else if (query.includes('group') || query.includes('material')) { searchConfig.forceLevel = 'Material Group'; query = query.replace(/groups?|materials?/g, ''); }
    else if (query.includes('dept') || query.includes('department')) { searchConfig.forceLevel = 'Department'; query = query.replace(/departments?|depts?/g, ''); }

    query = query.replace(/\b(in|for|of|show|me|the)\b/g, '').trim();
    if(query.length > 0) searchConfig.keyword = query;

    runAnalysis();
}

function clearSmartSearch() {
    document.getElementById('aiSearchBox').value = '';
    document.getElementById('autocomplete-list').style.display = 'none';
    searchConfig = { isActive: false, limit: 100, forceLevel: null, keyword: null };
    drillDownStack = [];
    runAnalysis();
}

function getMultiSelectValues(level) {
    return Array.from(document.querySelectorAll(`#f_${level} input:checked`)).map(cb => cb.value);
}

function updateMultiBtnText(level) {
    const checked = getMultiSelectValues(level);
    const btn = document.getElementById(`btn_${level}`);
    if (checked.length === 0) btn.innerText = `All ${level}s`;
    else if (checked.length === 1) btn.innerText = checked[0];
    else btn.innerText = `${checked.length} Selected`;
    cascadeUpdate(level === 'Country' ? 1 : 2);
}

function populateMultiSelect(level, dataSet) {
    const unique = [...new Set(dataSet.map(r => r[level]))].filter(Boolean).sort();
    document.getElementById(`f_${level}`).innerHTML = unique.map(v => `<label><input type="checkbox" value="${v}" onchange="updateMultiBtnText('${level}')"> ${v}</label>`).join("");
    updateMultiBtnText(level);
}

function getFilteredDataForLevel(levelIndex) {
    let d = rows;
    if (levelIndex > 0) {
        const countries = getMultiSelectValues('Country');
        if (countries.length > 0) d = d.filter(r => countries.includes(r.Country));
    }
    if (levelIndex > 1) {
        const depts = getMultiSelectValues('Department');
        if (depts.length > 0) d = d.filter(r => depts.includes(r.Department));
    }
    for(let i=2; i<levelIndex; i++) {
        const val = document.getElementById(`f_${hierarchyConfig[i].replace(/\s+/g,'')}`).value;
        if(val !== "All") d = d.filter(r => r[hierarchyConfig[i]] === val);
    }
    return d;
}

function populateSingleSelect(levelName, dataSet) {
    const el = document.getElementById(`f_${levelName.replace(/\s+/g,'')}`);
    const currentVal = el.value;
    const unique = [...new Set(dataSet.map(r => r[levelName]))].filter(Boolean).sort();
    el.innerHTML = `<option value="All">-- All ${levelName}s --</option>` + unique.map(v => `<option value="${v}">${v}</option>`).join("");
    if(unique.includes(currentVal)) el.value = currentVal;
}

function cascadeUpdate(changedLevelIndex) {
    if(!searchConfig.isActive) drillDownStack = []; 
    for(let i = Math.max(2, changedLevelIndex); i < hierarchyConfig.length; i++) {
        const dataForThisLevel = getFilteredDataForLevel(i);
        populateSingleSelect(hierarchyConfig[i], dataForThisLevel);
    }
    runAnalysis();
}

function toggleSort(col) {
    if (sortConfig.col === col) sortConfig.dir = sortConfig.dir === 'desc' ? 'asc' : 'desc';
    else { sortConfig.col = col; sortConfig.dir = 'desc'; }
    
    ['cur', 'prev', 'var', 'pct'].forEach(c => {
        document.getElementById(`icn-${c}`).innerText = '';
        document.getElementById(`icn-${c}`).classList.remove('sort-active');
    });
    const activeIcon = document.getElementById(`icn-${col}`);
    activeIcon.innerText = sortConfig.dir === 'desc' ? '▼' : '▲';
    activeIcon.classList.add('sort-active');
    runAnalysis();
}

function handleRowClick(val) {
    const currentIndex = drillHierarchy.indexOf(currentAggLevel);
    if(currentIndex >= 0 && currentIndex < drillHierarchy.length - 1) {
        drillDownStack.push({ dimension: currentAggLevel, value: val });
        runAnalysis();
    }
}

function stepBackDrill() {
    drillDownStack.pop();
    runAnalysis();
}

function clearAllDrill() {
    drillDownStack = [];
    if(searchConfig.isActive) clearSmartSearch(); 
    else runAnalysis();
}

// --- NEW MULTI-MONTH ANALYSIS LOGIC ---
function runAnalysis() {
    const curYear = document.getElementById('selYear').value;
    const metric = document.getElementById('metric').value;
    if(!curYear) return;

    const targetMonths = Array.from(document.querySelectorAll('#f_TargetMonth input:checked')).map(i => i.value);
    let prevMonths = [];
    let prevYear = "";

    if (mode === 'Custom') {
        prevYear = document.getElementById('selPrevYear').value;
        prevMonths = Array.from(document.querySelectorAll('#f_PrevMonth input:checked')).map(i => i.value);
    } else if (mode === 'YoY') { 
        prevYear = (parseInt(curYear) - 1).toString();
        prevMonths = [...targetMonths];
    } else {
        prevYear = curYear; 
    }

    let curLabels = targetMonths.map(m => `${m} ${curYear}`);
    let prevLabels = [];

    if (mode === 'MoM') {
        prevLabels = targetMonths.map(m => {
            const mIdx = monthOrder.indexOf(m);
            if (mIdx === 0) return `DEC ${parseInt(curYear) - 1}`;
            return `${monthOrder[mIdx - 1]} ${curYear}`;
        });
    } else {
        prevLabels = prevMonths.map(m => `${m} ${prevYear}`);
    }

    // Dynamic Header Formulation
    const formatTimeLabel = (months, y) => {
        if (months.length === 0) return `No Selection`;
        if (months.length === 1) return `${months[0]} ${y}`;
        if (months.length <= 3) return `${months.join('/')} ${y}`;
        return `${months.length} Months ${y}`;
    };

    let displayCurLabel = formatTimeLabel(targetMonths, curYear);
    let displayPrevLabel = mode === 'MoM' && targetMonths.length > 0 
        ? (targetMonths.length === 1 ? prevLabels[0] : `${targetMonths.length} Prev Months`) 
        : formatTimeLabel(prevMonths, prevYear);

    let d = getFilteredDataForLevel(hierarchyConfig.length);

    if (searchConfig.isActive && searchConfig.keyword) {
        const kw = searchConfig.keyword;
        d = d.filter(r => {
            return Object.values(r).some(val => String(val).toLowerCase().includes(kw));
        });
    }

    if (drillDownStack.length > 0) {
        drillDownStack.forEach(drill => {
            d = d.filter(r => r[drill.dimension] === drill.value);
        });
    }

    if (drillDownStack.length > 0) {
        const lastDrill = drillDownStack[drillDownStack.length - 1];
        const lastIndex = drillHierarchy.indexOf(lastDrill.dimension);
        currentAggLevel = drillHierarchy[lastIndex + 1] || "Product Name";
    } else if (searchConfig.isActive && searchConfig.forceLevel) {
        currentAggLevel = searchConfig.forceLevel;
    } else {
        currentAggLevel = "Department";
        const depts = getMultiSelectValues('Department');
        if (depts.length > 0) currentAggLevel = "Category";
        
        for (let i = 2; i < hierarchyConfig.length; i++) {
            const val = document.getElementById(`f_${hierarchyConfig[i].replace(/\s+/g,'')}`).value;
            if (val !== "All") currentAggLevel = hierarchyConfig[i + 1] || hierarchyConfig[i];
        }
    }

    const drillHeader = document.getElementById('drillDownHeader');
    document.getElementById('thDimName').innerText = currentAggLevel;

    if (drillDownStack.length > 0) {
        drillHeader.style.setProperty('display', 'flex', 'important');
        const breadcrumbs = drillDownStack.map(b => b.value).join(' > ');
        let searchContext = (searchConfig.isActive && document.getElementById('aiSearchBox').value) 
            ? ` <small class="text-muted fw-normal ms-2">(Search: '${document.getElementById('aiSearchBox').value}')</small>` : '';
        document.getElementById('drillDownTitle').innerHTML = `Viewing: <span class="text-success">${breadcrumbs}</span>${searchContext}`;
        document.getElementById('btnStepBack').style.display = 'inline-block';
    } else if (searchConfig.isActive) {
        drillHeader.style.setProperty('display', 'flex', 'important');
        document.getElementById('drillDownTitle').innerHTML = `🔍 AI Search applied: <span class="text-success">${document.getElementById('aiSearchBox').value}</span>`;
        document.getElementById('btnStepBack').style.display = 'none';
    } else {
        drillHeader.style.setProperty('display', 'none', 'important');
    }

    const map = {};
    d.forEach(r => {
        const k = r[currentAggLevel] || "Unknown Item";
        if(!map[k]) map[k] = { cur: 0, prev: 0 };
        const rowDate = r["Calendar Year/Month"];
        if(curLabels.includes(rowDate)) map[k].cur += (+r[metric] || 0);
        if(prevLabels.includes(rowDate)) map[k].prev += (+r[metric] || 0);
    });

    let results = Object.entries(map);

    results.sort((a, b) => {
        let vA, vB;
        if (sortConfig.col === 'cur') { vA = a[1].cur; vB = b[1].cur; }
        else if (sortConfig.col === 'prev') { vA = a[1].prev; vB = b[1].prev; }
        else if (sortConfig.col === 'var') { vA = a[1].cur - a[1].prev; vB = b[1].cur - b[1].prev; }
        else if (sortConfig.col === 'pct') {
            vA = a[1].prev ? (a[1].cur - a[1].prev) / a[1].prev : -999;
            vB = b[1].prev ? (b[1].cur - b[1].prev) / b[1].prev : -999;
        }
        return sortConfig.dir === 'desc' ? vB - vA : vA - vB;
    });

    animateDataUpdate(() => updateDashboard(results, metric, displayCurLabel, displayPrevLabel));
}

function animateDataUpdate(updateFunc) {
    const tableBody = document.getElementById('dataTable');
    const chartArea = document.getElementById('mainChart');
    const kpis = document.querySelectorAll('.kpi-val');
    
    tableBody.classList.add('fade-out');
    chartArea.classList.add('fade-out');
    kpis.forEach(k => k.style.opacity = '0');

    setTimeout(() => {
        updateFunc(); 
        tableBody.classList.remove('fade-out');
        chartArea.classList.remove('fade-out');
        kpis.forEach(k => k.style.opacity = '1');
    }, 150); 
}

function updateDashboard(data, metric, curLabel, prevLabel) {
    const isCurrency = metric === 'Sales Value';
    
    document.getElementById('lblKpiCur').innerText = curLabel;
    document.getElementById('lblKpiPrev').innerText = prevLabel;

    document.getElementById('thCur').innerHTML = `${curLabel} (${isCurrency?'AED':'Qty'}) <span class="sort-icon" id="icn-cur">${sortConfig.col==='cur'?(sortConfig.dir==='desc'?'▼':'▲'):''}</span>`;
    document.getElementById('thPrev').innerHTML = `${prevLabel} (${isCurrency?'AED':'Qty'}) <span class="sort-icon" id="icn-prev">${sortConfig.col==='prev'?(sortConfig.dir==='desc'?'▼':'▲'):''}</span>`;

    const sumCur = data.reduce((s,i) => s + i[1].cur, 0);
    const sumPrev = data.reduce((s,i) => s + i[1].prev, 0);
    const vari = sumCur - sumPrev;
    const pct = sumPrev ? (vari / sumPrev * 100).toFixed(1) : 0;

    document.getElementById('kpiCurrent').innerText = formatValue(sumCur, isCurrency, false);
    document.getElementById('kpiPrev').innerText = formatValue(sumPrev, isCurrency, false);
    document.getElementById('kpiVar').innerText = (vari > 0 ? '+' : '') + formatValue(vari, isCurrency, false);
    document.getElementById('kpiPct').innerText = pct + '%';
    
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    const successColor = isDark ? '#00e676' : '#2e7d32';
    const dangerColor = isDark ? '#ff5252' : '#d32f2f';
    document.getElementById('kpiPct').style.color = vari >= 0 ? successColor : dangerColor;

    const isLastLevel = drillHierarchy.indexOf(currentAggLevel) === drillHierarchy.length - 1;
    const limit = (searchConfig.isActive && drillDownStack.length === 0) ? searchConfig.limit : 100;

    document.getElementById('dataTable').innerHTML = data.slice(0, limit).map(([name, val]) => {
        const d = val.cur - val.prev;
        const p = val.prev ? (d / val.prev * 100).toFixed(1) : 0;
        const safeName = name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
        
        const canClick = !isLastLevel; 
        const rowClass = canClick ? "clickable-row" : ""; 

        return `<tr class="${rowClass}" ${canClick ? `onclick="handleRowClick('${safeName}')"` : ''}>
            <td class="ps-4 fw-bold text-truncate" style="max-width: 250px;" title="${name}">${name}</td>
            <td class="num">${formatValue(val.cur, isCurrency, false)}</td>
            <td class="num text-muted">${formatValue(val.prev, isCurrency, false)}</td>
            <td class="num ${d>=0?'up':'down'}">${d>0?'+':''}${formatValue(d, isCurrency, false)}</td>
            <td class="num pe-4"><span class="status-pill ${d>=0?'bg-up':'bg-down'}">${p}%</span></td>
        </tr>`;
    }).join("");

    if (chart && typeof chart.updateOptions === 'function') {
        const chartLimit = (searchConfig.isActive && drillDownStack.length === 0) ? Math.min(searchConfig.limit, 20) : 8;
        const topChartData = [...data].sort((a,b)=>b[1].cur - a[1].cur).slice(0, chartLimit); 
        chart.updateOptions({
            xaxis: { categories: topChartData.map(i => i[0].length > 15 ? i[0].substring(0,15)+'...' : i[0]) },
            yaxis: { labels: { formatter: function(val) { return formatValue(val, isCurrency, true); } } },
            tooltip: { y: { formatter: function(val) { return formatValue(val, isCurrency, true); } } }, 
            series: [{ name: curLabel, data: topChartData.map(i => i[1].cur) }, { name: prevLabel, data: topChartData.map(i => i[1].prev) }]
        });
    }
}

function initChart() {
    chart = new ApexCharts(document.querySelector("#mainChart"), {
        chart: { type: 'bar', height: 320, toolbar: {show: false}, fontFamily: 'Poppins', background: 'transparent' },
        plotOptions: { bar: { borderRadius: 4, columnWidth: '50%' } },
        colors: ['#008334', '#b2bec3'], 
        series: [{ name: 'Current', data: [] }, { name: 'Previous', data: [] }],
        xaxis: { categories: [] },
        dataLabels: { enabled: false },
        legend: { position: 'top' },
        theme: { mode: 'light' },
        stroke: { show: true, width: 2, colors: ['transparent'] }
    });
    chart.render();
}

function updateChartType() {
    const type = document.getElementById('chartTypeSelector').value;
    chart.updateOptions({ chart: { type: type } });
}
</script>
